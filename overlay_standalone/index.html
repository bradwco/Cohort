<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Focus Orb Overlay (standalone)</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Notch + AI output, draggable together -->
    <div id="notch-wrapper">
      <div class="notch" id="notch">
        <div class="notch-handle" id="notch-handle" title="Drag to move">
          <svg
            width="10"
            height="10"
            viewBox="0 0 10 10"
            fill="currentColor"
            aria-hidden="true"
          >
            <circle cx="2" cy="2" r="1.5" />
            <circle cx="8" cy="2" r="1.5" />
            <circle cx="2" cy="8" r="1.5" />
            <circle cx="8" cy="8" r="1.5" />
          </svg>
        </div>
        <input
          class="notch-input"
          id="notch-input"
          type="text"
          placeholder="Ask me anything…"
        />
        <button class="notch-submit" id="notch-submit" aria-label="Submit">
          <svg
            width="14"
            height="11"
            viewBox="0 0 14 11"
            fill="none"
            stroke="currentColor"
            stroke-width="1.6"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <path d="M13 1v5a2 2 0 0 1-2 2H1m0 0 3-3M1 8l3 3" />
          </svg>
        </button>
      </div>

      <div class="ai-peek" id="ai-peek" title="Show conversation"></div>

      <!-- ai-panel: fixed header + scrollable body -->
      <div class="ai-panel" id="ai-panel">
        <div class="ai-panel-header">
          <button class="ai-minimize" id="ai-minimize" title="Minimize">
            <svg
              width="10"
              height="10"
              viewBox="0 0 10 10"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <path d="M6.5 1H9V3.5M9 1L5.5 4.5" />
              <path d="M3.5 9H1V6.5M1 9L4.5 5.5" />
            </svg>
          </button>
        </div>
        <div class="ai-scroll" id="ai-scroll">
          <div id="ai-messages"></div>
        </div>
        <div class="ai-resize-grip" id="ai-resize-grip" title="Resize">
          <svg
            width="10"
            height="10"
            viewBox="0 0 10 10"
            fill="currentColor"
            aria-hidden="true"
          >
            <circle cx="8" cy="8" r="1.5" />
            <circle cx="4" cy="8" r="1.5" />
            <circle cx="8" cy="4" r="1.5" />
          </svg>
        </div>
      </div>
    </div>

    <div id="focus-ring"></div>
    <div id="focus-debug"></div>

    <!-- Right column -->
    <div class="column" id="column">
      <div class="column-handle" id="column-handle" title="Drag to move">
        <svg
          width="16"
          height="10"
          viewBox="0 0 16 10"
          fill="currentColor"
          aria-hidden="true"
        >
          <circle cx="2" cy="2" r="1.5" />
          <circle cx="8" cy="2" r="1.5" />
          <circle cx="14" cy="2" r="1.5" />
          <circle cx="2" cy="8" r="1.5" />
          <circle cx="8" cy="8" r="1.5" />
          <circle cx="14" cy="8" r="1.5" />
        </svg>
      </div>
      <div class="avatars" id="avatars"></div>
      <div class="divider"></div>
      <div class="timer" id="timer">25:00</div>
    </div>

    <script src="ai/pixel_avatar.js"></script>
    <script src="ai/gemini.js"></script>
    <script src="ai/classifier.js"></script>
    <script>
      // ── Timer (wallclock-synced stopwatch) ─────────────────────────────
      // Both the overlay timer and the dashboard timer derive their value
      // from (Date.now() - sessionStartedAt - totalPauseMs), so they stay
      // in sync across pause / re-dock cycles instead of drifting apart
      // due to two independent setInterval clocks.
      let sessionStartedAtMs = Date.now();
      let totalPauseMs = 0;
      const timerEl = document.getElementById("timer");
      timerEl.textContent = "00:00";

      function renderTimer() {
        const elapsedSec = Math.max(0, Math.floor((Date.now() - sessionStartedAtMs - totalPauseMs) / 1000));
        timerEl.textContent =
          String(Math.floor(elapsedSec / 60)).padStart(2, "0") +
          ":" +
          String(elapsedSec % 60).padStart(2, "0");
      }
      setInterval(renderTimer, 1000);

      let sessionId = null;
      let ownAvatarEl = null;

      (async () => {
        try {
          const cfg = await window.electronAPI.getConfig();
          if (cfg.SESSION_STARTED_AT) {
            sessionStartedAtMs = Date.parse(cfg.SESSION_STARTED_AT) || Date.now();
            totalPauseMs = cfg.TOTAL_PAUSE_MS || 0;
            renderTimer();
          }
          if (cfg.SESSION_ID) {
            sessionId = cfg.SESSION_ID;
            console.log("[session] using existing:", sessionId);
          } else {
            sessionId = await window.electronAPI.createSession({
              workflowGroup: "Focus Session",
            });
            console.log("[session] created:", sessionId);
          }
          window.electronAPI.updateFocusState("productive").catch(() => {});
        } catch (e) {
          console.warn("[session] failed to init:", e.message);
        }
      })();

      (async () => {
        try {
          const cfg = await window.electronAPI.getConfig();
          console.log(
            "[avatar] config userId:",
            cfg.USER_ID,
            "url:",
            cfg.SUPABASE_URL,
          );
          if (!cfg.SUPABASE_URL || !cfg.SUPABASE_ANON_KEY || !cfg.USER_ID) {
            console.warn("[avatar] missing config fields");
            return;
          }
          const url = cfg.SUPABASE_URL.replace(/\/$/, "");
          const resp = await fetch(
            `${url}/rest/v1/profiles?id=eq.${cfg.USER_ID}&select=*`,
            {
              headers: {
                apikey: cfg.SUPABASE_ANON_KEY,
                Authorization: `Bearer ${cfg.SUPABASE_ANON_KEY}`,
              },
            },
          );
          console.log("[avatar] fetch status:", resp.status);
          if (!resp.ok) {
            console.warn("[avatar] fetch failed:", await resp.text());
            return;
          }
          const rows = await resp.json();
          const profile = rows[0];
          console.log("[avatar] profile:", JSON.stringify(profile));
          if (!profile?.avatar) {
            console.warn("[avatar] no avatar in profile");
            return;
          }
          const avatarsEl = document.getElementById("avatars");
          const div = document.createElement("div");
          div.className = "avatar status-active";
          ownAvatarEl = div;
          div.style.cssText = "background:transparent;";
          div.innerHTML =
            window.renderPixelAvatar(profile.avatar) +
            `<span class="name">${profile.username ?? "me"}</span>`;
          avatarsEl.appendChild(div);
          console.log("[avatar] rendered for", profile.username);
        } catch (e) {
          console.error("[avatar] error:", e);
        }
      })();

      // ── Friend avatars (poll every 30s) ────────────────────────────────
      const FRIEND_SYNC_MS = 5_000;
      const friendAvatarMap = {}; // userId → { el: HTMLElement, focusState: string | null }

      const ORB_COLORS = {
        amber: "#E8A87C",
        blue: "#7CB0E8",
        green: "#9CE8A8",
        purple: "#B89AE8",
        coral: "#E8756B",
        moss: "#7FA075",
        gold: "#D8B75C",
        slate: "#51616B",
      };

      function focusStateClass(state) {
        if (state === "distracted") return "status-off";
        if (state === "idle") return "status-idle";
        return "status-active";
      }

      async function syncFriendAvatars() {
        try {
          const cfg = await window.electronAPI.getConfig();
          if (!cfg.SUPABASE_URL || !cfg.SUPABASE_ANON_KEY || !cfg.USER_ID)
            return;

          const url = cfg.SUPABASE_URL.replace(/\/$/, "");
          const headers = {
            apikey: cfg.SUPABASE_ANON_KEY,
            Authorization: `Bearer ${cfg.SUPABASE_ANON_KEY}`,
          };

          const fResp = await fetch(
            `${url}/rest/v1/friendships?user_id=eq.${cfg.USER_ID}&select=friend_ids`,
            { headers },
          );
          const fData = await fResp.json();
          if (!fResp.ok) {
            console.warn("[friends] friendships fetch error:", fData);
            return;
          }
          const [fRow] = Array.isArray(fData) ? fData : [];
          const friendIds = fRow?.friend_ids ?? [];
          console.log("[friends] friend_ids:", friendIds);
          if (friendIds.length === 0) return;

          const pResp = await fetch(
            `${url}/rest/v1/profiles?id=in.(${friendIds.join(",")})&select=*`,
            { headers },
          );
          const profiles = await pResp.json();
          console.log(
            "[friends] profiles:",
            profiles.map((p) => ({
              u: p.username,
              status: p.hardware_status,
              hasAvatar: !!p.avatar,
            })),
          );

          const avatarsEl = document.getElementById("avatars");
          const seenIds = new Set();

          for (const p of profiles) {
            seenIds.add(p.id);
            const isDocked = p.hardware_status === "docked";
            const existing = friendAvatarMap[p.id];

            if (isDocked && !existing) {
              const div = document.createElement("div");
              div.className = "avatar " + focusStateClass(p.focus_state);
              let body = "";
              if (p.avatar) {
                div.style.cssText = "background:transparent;";
                body = window.renderPixelAvatar(p.avatar);
              } else {
                const bg = ORB_COLORS[p.orb_color] ?? "#51616B";
                div.style.cssText = `background:${bg};`;
                body = `<span style="font-size:14px;font-weight:600;color:rgba(255,255,255,0.85)">${(p.username?.[0] ?? "?").toUpperCase()}</span>`;
              }
              div.innerHTML =
                body + `<span class="name">${p.username ?? "?"}</span>`;
              avatarsEl.appendChild(div);
              friendAvatarMap[p.id] = {
                el: div,
                focusState: p.focus_state ?? null,
              };
              console.log(
                "[friends] appeared:",
                p.username,
                "(avatar:",
                !!p.avatar,
                "focus:",
                p.focus_state,
                ")",
              );
              window.electronAPI.sendHardwareSerialCommand?.("1");
            } else if (isDocked && existing) {
              const newFocusState = p.focus_state ?? null;
              if (existing.focusState !== newFocusState) {
                existing.el.className =
                  "avatar " + focusStateClass(newFocusState);
                existing.focusState = newFocusState;
                console.log(
                  "[friends] glow updated:",
                  p.username,
                  "->",
                  newFocusState,
                );
              }
            } else if (!isDocked && existing) {
              existing.el.remove();
              delete friendAvatarMap[p.id];
              console.log("[friends] disappeared:", p.username);
              window.electronAPI.sendHardwareSerialCommand?.("8");
            }
          }

          for (const id of Object.keys(friendAvatarMap)) {
            if (!seenIds.has(id)) {
              friendAvatarMap[id].el.remove();
              delete friendAvatarMap[id];
            }
          }
        } catch (e) {
          console.warn("[friends] sync error:", e.message);
        }
      }

      syncFriendAvatars();
      setInterval(syncFriendAvatars, FRIEND_SYNC_MS);

      let lastActivityTime = Date.now();
      // Filters out hand-tremor / wireless-mouse jitter so the overlay
      // doesn't treat sub-pixel drift as "activity" and exit idle state.
      const MOUSE_JITTER_PX = 6;
      let lastMouseX = -1;
      let lastMouseY = -1;

      // ── Notch drag (X + Y) ─────────────────────────────────────────────
      const wrapper = document.getElementById("notch-wrapper");
      const notchHandle = document.getElementById("notch-handle");
      let notchDragging = false,
        notchOffX = 0,
        notchOffY = 0;

      notchHandle.addEventListener("mousedown", (e) => {
        const r = wrapper.getBoundingClientRect();
        wrapper.style.transform = "none";
        wrapper.style.left = r.left + "px";
        wrapper.style.top = r.top + "px";
        notchDragging = true;
        notchOffX = e.clientX - r.left;
        notchOffY = e.clientY - r.top;
        window.electronAPI.setIgnoreMouseEvents(false);
        e.preventDefault();
      });

      // ── Column drag (Y only) ───────────────────────────────────────────
      const column = document.getElementById("column");
      const colHandle = document.getElementById("column-handle");
      let colDragging = false,
        colOffY = 0;

      colHandle.addEventListener("mousedown", (e) => {
        const r = column.getBoundingClientRect();
        column.style.transform = "none";
        column.style.top = r.top + "px";
        colDragging = true;
        colOffY = e.clientY - r.top;
        window.electronAPI.setIgnoreMouseEvents(false);
        e.preventDefault();
      });

      // ── Panel resize ───────────────────────────────────────────────────
      const aiPanelEl = document.getElementById("ai-panel");
      const aiScrollEl = document.getElementById("ai-scroll");
      const resizeGrip = document.getElementById("ai-resize-grip");
      let resizing = false,
        rsY = 0,
        rsH = 0;

      resizeGrip.addEventListener("mousedown", (e) => {
        resizing = true;
        rsY = e.clientY;
        rsH = aiScrollEl.getBoundingClientRect().height;
        window.electronAPI.setIgnoreMouseEvents(false);
        e.preventDefault();
      });

      document.addEventListener("mouseup", () => {
        notchDragging = false;
        colDragging = false;
        resizing = false;
      });

      document.addEventListener("mousemove", (e) => {
        if (lastMouseX < 0 || Math.hypot(e.clientX - lastMouseX, e.clientY - lastMouseY) >= MOUSE_JITTER_PX) {
          lastActivityTime = Date.now();
          lastMouseX = e.clientX;
          lastMouseY = e.clientY;
        }
        if (notchDragging) {
          wrapper.style.left = e.clientX - notchOffX + "px";
          wrapper.style.top = e.clientY - notchOffY + "px";
          return;
        }
        if (colDragging) {
          column.style.top = e.clientY - colOffY + "px";
          return;
        }
        if (resizing) {
          aiScrollEl.style.maxHeight =
            Math.max(80, rsH + (e.clientY - rsY)) + "px";
          return;
        }
        const el = document.elementFromPoint(e.clientX, e.clientY);
        const overUI = el && el.closest("#notch-wrapper, .column");
        window.electronAPI.setIgnoreMouseEvents(!overUI);
      });

      // ── Gemini AI ──────────────────────────────────────────────────────
      let gemini = null;
      const peekEl = document.getElementById("ai-peek");
      const messagesEl = document.getElementById("ai-messages");

      async function ensureGemini() {
        if (gemini) return;
        const cfg = await window.electronAPI.getConfig();
        gemini = new GeminiClient(cfg.GEMINI_API_KEY);
      }

      function renderMarkdown(raw) {
        return raw
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>")
          .replace(/\*(.*?)\*/g, "<em>$1</em>")
          .replace(/`([^`]+)`/g, "<code>$1</code>")
          .replace(/\n/g, "<br>");
      }

      function addMessage(role, html, classList = []) {
        const div = document.createElement("div");
        div.className = ["ai-message", role, ...classList].join(" ");
        div.innerHTML = html;
        messagesEl.appendChild(div);
        aiPanelEl.classList.add("visible");
        wrapper.classList.remove("minimized");
        aiScrollEl.scrollTop = aiScrollEl.scrollHeight;
        return div;
      }

      async function handleSubmit() {
        await ensureGemini();
        const input = document.getElementById("notch-input");
        const userText = input.value.trim();
        input.value = "";

        if (!userText && gemini.isFirstMessage) {
          addMessage(
            "assistant",
            "Screen is visible — describe what you need help with.",
          );
          return;
        }

        if (userText) addMessage("user", renderMarkdown(userText));
        const loading = addMessage("assistant", "…", ["loading"]);

        try {
          const screenshot = await window.electronAPI.takeScreenshot();
          const reply = await gemini.send(userText || null, screenshot);
          loading.innerHTML = renderMarkdown(reply);
          loading.classList.remove("loading");
        } catch (err) {
          loading.innerHTML = "Error: " + err.message;
          loading.classList.replace("loading", "error");
        }

        aiScrollEl.scrollTop = aiScrollEl.scrollHeight;
      }

      document
        .getElementById("notch-input")
        .addEventListener("keydown", (e) => {
          if (e.key === "Enter") handleSubmit();
        });
      document
        .getElementById("notch-submit")
        .addEventListener("click", handleSubmit);

      document.getElementById("ai-minimize").addEventListener("click", () => {
        aiPanelEl.classList.remove("visible");
        wrapper.classList.add("minimized");
      });

      peekEl.addEventListener("click", () => {
        aiPanelEl.classList.add("visible");
        wrapper.classList.remove("minimized");
        aiScrollEl.scrollTop = aiScrollEl.scrollHeight;
      });

      // ── Focus state tracking ───────────────────────────────────────────
      // Local-first pipeline: cheap thumbnail capture -> perceptual hash gate ->
      // localhost vision model -> rolling five-minute productivity score.
      const IDLE_MS = 30_000;
      const IDLE_WAKE_MS = 8_000;
      const ACTIVE_CHECK_MS = 1_000;
      const CLASSIFY_COOLDOWN = 2_500;
      const DISTRACTED_CLASSIFY_COOLDOWN = 2_500;
      const HASH_DIFF_THRESHOLD = 13; // roughly 5% of a 16x16 average hash
      // Require N consecutive 1s polls of detected activity before exiting
      // idle. Combined with the overlay mousemove jitter filter above, this
      // suppresses "tiny vibrations" from popping the user out of idle.
      const ACTIVE_STREAK_REQUIRED = 3;

      let focusClassifier = null;
      let focusGate = null;
      let focusSmoother = null;
      let lastActiveCheckTime = 0;
      let lastClassifyTime    = 0;
      let classifyInFlight    = false;
      let currentFocusState   = 'productive';
      let lastContentChangeTime = 0; // updated when screen content changes (video detection)
      let activeStreak = 0;
      let distractedProductiveStreak = 0;

      function setFocusState(state) {
        if (state === currentFocusState) return;
        currentFocusState = state;
        if (state !== "distracted") distractedProductiveStreak = 0;
        document.body.classList.remove("state-distracted", "state-idle");
        if (state !== "productive")
          document.body.classList.add("state-" + state);
        window.electronAPI.updateFocusState(state).catch(() => {});
        if (ownAvatarEl)
          ownAvatarEl.className = "avatar " + focusStateClass(state);
      }

      async function checkFocus() {
        try {
          if (!focusClassifier) {
            const cfg = await window.electronAPI.getConfig();
            focusClassifier = new ScreenClassifier({
              endpoint: cfg.LOCAL_VLM_URL,
              model: cfg.LOCAL_VLM_MODEL,
            });
            focusGate = new PerceptualHashGate({
              threshold: HASH_DIFF_THRESHOLD,
            });
            focusSmoother = new FocusSmoother({
              windowMs: 5 * 60_000,
              minSamples: 3,
              productiveThreshold: 0.7,
            });
          }

          const now = Date.now();
          const dbg = document.getElementById('focus-debug');

          // Three activity signals combined:
          //   1. system idle time  — keyboard / mouse in ANY app (via powerMonitor IPC)
          //   2. overlay mousemove — mouse hovering over overlay UI
          //   3. content change    — screen pixels changing (video playback detection)
          const sysSec = await window.electronAPI.getSystemIdleSecs();
          const isActive = sysSec * 1000 < IDLE_MS
            || (now - lastActivityTime) < IDLE_MS
            || (now - lastContentChangeTime) < IDLE_MS;
          const userActiveForIdleWake = sysSec * 1000 < IDLE_WAKE_MS;

          // When idle: require sustained activity (ACTIVE_STREAK_REQUIRED
          // consecutive 1s polls) before flipping back to productive, so a
          // single sub-second jitter doesn't pop the user out of idle.
          if (currentFocusState === 'idle') {
            if (userActiveForIdleWake) {
              activeStreak += 1;
              if (activeStreak >= ACTIVE_STREAK_REQUIRED) {
                activeStreak = 0;
                setFocusState('productive');
              } else if (dbg) {
                dbg.textContent = `idle · waking (${activeStreak}/${ACTIVE_STREAK_REQUIRED})`;
              }
            } else {
              activeStreak = 0;
            }
            return;
          }
          activeStreak = 0;

          // Not idle: throttle the rest to ACTIVE_CHECK_MS
          if (now - lastActiveCheckTime < ACTIVE_CHECK_MS) return;
          lastActiveCheckTime = now;

          if (!isActive) {
            focusSmoother.reset();
            setFocusState("idle");
            return;
          }

          // Active + changed screen + local model available -> classify
          const classifyCooldown = currentFocusState === 'distracted'
            ? DISTRACTED_CLASSIFY_COOLDOWN
            : CLASSIFY_COOLDOWN;
          if (classifyInFlight || now - lastClassifyTime < classifyCooldown)
            return;

          classifyInFlight = true;
          lastClassifyTime = now;
          let thumbUrl;
          try {
            thumbUrl = await window.electronAPI.takeThumbnail();
          } catch (err) {
            if (dbg) dbg.textContent = "screenshot error: " + (err?.message ?? err);
            classifyInFlight = false;
            return;
          }
          if (!thumbUrl) {
            if (dbg) dbg.textContent = "screenshot returned null";
            classifyInFlight = false;
            return;
          }

          const gate = await focusGate.hasSignificantChange(thumbUrl);
          if (!gate.changed) {
            classifyInFlight = false;
            if (dbg)
              dbg.textContent = `unchanged · hash ${gate.diff} · ${currentFocusState}`;
            return;
          }

          focusClassifier
            .classify(thumbUrl)
            .then((result) => {
              const productiveInstant = result === 'deep_work' || result === 'admin' || result === 'productive';
              if (currentFocusState === 'distracted') {
                distractedProductiveStreak = productiveInstant ? distractedProductiveStreak + 1 : 0;
                if (distractedProductiveStreak >= 2) {
                  distractedProductiveStreak = 0;
                  focusSmoother.reset();
                  setFocusState('productive');
                  if (dbg) dbg.textContent = `${result} · recovered from distracted`;
                  return;
                }
              }

              const smoothed = focusSmoother.add(result);
              if (smoothed.ready) setFocusState(smoothed.label);
              if (dbg) {
                const pct = Math.round(smoothed.productiveRatio * 100);
                dbg.textContent = `${result} · ${pct}% productive · n=${smoothed.sampleCount}`;
              }
            })
            .catch((e) => {
              if (dbg) dbg.textContent = "local classifier: " + e.message;
            })
            .finally(() => {
              classifyInFlight = false;
            });
        } catch (e) {
          classifyInFlight = false;
          const dbg = document.getElementById('focus-debug');
          if (dbg) dbg.textContent = "focus error: " + (e?.message ?? e);
          console.warn("[focus] error:", e.message);
        }
      }

      // ── Video-change poller ────────────────────────────────────────────
      // Runs independently of checkFocus so that passively-watched video
      // (no keyboard/mouse input) still updates lastContentChangeTime and
      // prevents the idle state from triggering.
      let videoGate = null;
      setInterval(async () => {
        try {
          if (!videoGate) videoGate = new PerceptualHashGate({ threshold: HASH_DIFF_THRESHOLD });
          const thumb = await window.electronAPI.takeThumbnail();
          if (!thumb) return;
          const { changed } = await videoGate.hasSignificantChange(thumb);
          if (changed) lastContentChangeTime = Date.now();
        } catch (_e) {}
      }, 8_000);

      setInterval(checkFocus, 1_000);
    </script>
  </body>
</html>
