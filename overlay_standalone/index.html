<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Focus Orb Overlay (standalone)</title>
    <style>
      :root {
        --bg:        rgba(26, 26, 30, 0.72);
        --border:    rgba(255, 255, 255, 0.06);
        --divider:   rgba(255, 255, 255, 0.10);
        --text:      #dcd9d2;
        --text-soft: #a8a59e;
        --hover:     rgba(255, 255, 255, 0.10);
      }

      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        background: transparent;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", system-ui, sans-serif;
        color: var(--text);
        user-select: none;
        cursor: default;
      }

      /* Vertical column pinned to the right edge of the window. */
      .column {
        position: absolute;
        top: 0;
        right: 0;
        bottom: 0;
        width: 72px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        padding: 22px 12px;
        background: var(--bg);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border-left: 1px solid var(--border);
        box-sizing: border-box;
      }

      .avatars {
        display: flex;
        flex-direction: column;
        gap: 10px;
        align-items: center;
      }

      .avatar {
        position: relative;
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: var(--c);
        display: flex;
        align-items: center;
        justify-content: center;
        color: rgba(255, 255, 255, 0.88);
        font-size: 13px;
        font-weight: 500;
        letter-spacing: 0.3px;
        transition: transform 0.18s ease, box-shadow 0.18s ease;
      }
      .avatar:hover {
        transform: scale(1.08);
        box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.12);
      }

      /* Hover label — renders to the LEFT of the avatar (window has transparent
         padding on the left specifically for this). */
      .name {
        position: absolute;
        right: calc(100% + 12px);
        top: 50%;
        transform: translateY(-50%);
        white-space: nowrap;
        background: rgba(20, 20, 24, 0.94);
        color: var(--text);
        padding: 6px 11px;
        border-radius: 8px;
        font-size: 12px;
        font-weight: 400;
        opacity: 0;
        pointer-events: none;
        border: 1px solid var(--border);
        transition: opacity 0.18s ease;
      }
      .avatar:hover .name { opacity: 1; }

      .divider {
        width: 28px;
        height: 1px;
        background: var(--divider);
        margin: 4px 0;
      }

      .timer {
        font-size: 17px;
        font-weight: 500;
        letter-spacing: 0.6px;
        color: var(--text);
        font-variant-numeric: tabular-nums;
      }

      .stop {
        background: rgba(255, 255, 255, 0.05);
        color: var(--text-soft);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 6px 14px;
        font: inherit;
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 0.4px;
        cursor: pointer;
        transition: background 0.15s ease, color 0.15s ease;
      }
      .stop:hover  { background: var(--hover); color: var(--text); }
      .stop:active { background: rgba(255, 255, 255, 0.16); }
    </style>
  </head>
  <body>
    <div class="column">
      <div class="avatars">
        <div class="avatar" style="--c: #9c9088;">A<span class="name">Alex Chen</span></div>
        <div class="avatar" style="--c: #8a958e;">M<span class="name">Maya Rodriguez</span></div>
        <div class="avatar" style="--c: #93939a;">J<span class="name">Jamie Park</span></div>
        <div class="avatar" style="--c: #a89483;">S<span class="name">Sam Taylor</span></div>
        <div class="avatar" style="--c: #97889c;">R<span class="name">Riley Singh</span></div>
      </div>

      <div class="divider"></div>

      <div class="timer" id="timer">25:00</div>

      <button class="stop" id="stop">Stop</button>
    </div>

    <script>
      let secs = 25 * 60;
      const timerEl = document.getElementById('timer');
      const tick = setInterval(() => {
        secs = Math.max(0, secs - 1);
        const m = String(Math.floor(secs / 60)).padStart(2, '0');
        const s = String(secs % 60).padStart(2, '0');
        timerEl.textContent = m + ':' + s;
        if (secs === 0) clearInterval(tick);
      }, 1000);

      document.getElementById('stop').addEventListener('click', () => {
        window.close();
      });
    </script>
  </body>
</html>
