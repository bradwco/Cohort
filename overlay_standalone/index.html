<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Focus Orb Overlay (standalone)</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: transparent;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        color: #fff;
        user-select: none;
      }

      .card {
        -webkit-app-region: drag;          /* drag the window by the card */
        margin: 12px;
        padding: 16px 18px;
        display: flex;
        align-items: center;
        gap: 16px;
        background: rgba(20, 20, 30, 0.78);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 18px;
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
      }

      .orb {
        width: 56px;
        height: 56px;
        border-radius: 50%;
        flex-shrink: 0;
        background: radial-gradient(circle at 30% 30%, #b8a8ff 0%, #6b51e6 65%, #2d1d8c 100%);
        box-shadow: 0 0 28px rgba(155, 140, 255, 0.7);
        animation: pulse 3s ease-in-out infinite;
      }

      @keyframes pulse {
        0%, 100% { transform: scale(1);    box-shadow: 0 0 28px rgba(155, 140, 255, 0.65); }
        50%      { transform: scale(1.05); box-shadow: 0 0 42px rgba(155, 140, 255, 0.95); }
      }

      .info { display: flex; flex-direction: column; min-width: 0; }
      .label  { font-size: 11px; opacity: 0.6; text-transform: uppercase; letter-spacing: 1px; }
      .timer  { font-size: 28px; font-weight: 600; letter-spacing: 0.5px; line-height: 1.1; }

      button {
        -webkit-app-region: no-drag;        /* clickable, even though parent is draggable */
        margin-left: auto;
        background: rgba(255, 255, 255, 0.12);
        color: #fff;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 10px;
        padding: 8px 14px;
        font: inherit;
        font-size: 13px;
        cursor: pointer;
        transition: background 0.15s ease;
      }
      button:hover  { background: rgba(255, 255, 255, 0.22); }
      button:active { background: rgba(255, 255, 255, 0.32); }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="orb"></div>
      <div class="info">
        <div class="label">Focus</div>
        <div class="timer" id="timer">25:00</div>
      </div>
      <button id="summarize" title="Cluely-style help">Summarize</button>
    </div>

    <script>
      let secs = 25 * 60;
      const timerEl = document.getElementById('timer');
      setInterval(() => {
        secs = Math.max(0, secs - 1);
        const m = String(Math.floor(secs / 60)).padStart(2, '0');
        const s = String(secs % 60).padStart(2, '0');
        timerEl.textContent = m + ':' + s;
      }, 1000);

      document.getElementById('summarize').addEventListener('click', () => {
        // Placeholder — later this will IPC into src/main/claude_agent/
        console.log('summarize clicked');
      });
    </script>
  </body>
</html>
