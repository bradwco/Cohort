<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Focus Orb Overlay (standalone)</title>
    <style>
      :root {
        --bg:        rgba(15, 19, 27, 0.86);
        --border:    rgba(255, 255, 255, 0.04);
        --divider:   rgba(255, 255, 255, 0.06);
        --text:      #e6dfd1;
        --text-soft: #8e8676;
        --hover:     rgba(255, 255, 255, 0.06);
        --accent:    #e8a87c;
      }

      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        background: transparent;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", system-ui, sans-serif;
        color: var(--text);
        user-select: none;
        cursor: default;
      }

      /* Floating curvy pill pinned to the middle-right of the window. */
      .column {
        position: absolute;
        top: 50%;
        right: 8px;
        transform: translateY(-50%);
        width: 76px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 14px;
        padding: 18px 12px;
        background: var(--bg);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid var(--border);
        border-radius: 38px;
        box-sizing: border-box;
      }

      .avatars {
        display: flex;
        flex-direction: column;
        gap: 10px;
        align-items: center;
      }

      .avatar {
        position: relative;
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: var(--c);
        display: flex;
        align-items: center;
        justify-content: center;
        color: rgba(255, 255, 255, 0.88);
        font-size: 13px;
        font-weight: 500;
        letter-spacing: 0.3px;
        transition: transform 0.18s ease;
      }
      .avatar:hover { transform: scale(1.08); }

      /* Status glows — placeholder until wired to real presence data. */
      .status-active { box-shadow: 0 0 14px 0 rgba(122, 196, 128, 0.55); }
      .status-idle   { box-shadow: 0 0 10px 0 rgba(150, 145, 138, 0.45); }
      .status-off    { box-shadow: 0 0 14px 0 rgba(214, 110, 100, 0.55); }

      /* Hover label — renders to the LEFT of the avatar (window has transparent
         padding on the left specifically for this). */
      .name {
        position: absolute;
        right: calc(100% + 12px);
        top: 50%;
        transform: translateY(-50%);
        white-space: nowrap;
        background: rgba(12, 15, 22, 0.95);
        color: var(--text);
        padding: 6px 12px;
        border-radius: 14px;
        font-size: 12px;
        font-weight: 400;
        opacity: 0;
        pointer-events: none;
        border: 1px solid var(--border);
        transition: opacity 0.18s ease;
      }
      .avatar:hover .name { opacity: 1; }

      .divider {
        width: 28px;
        height: 1px;
        background: var(--divider);
        margin: 4px 0;
      }

      .timer {
        font-family: "Cormorant Garamond", "Playfair Display", Georgia, "Times New Roman", serif;
        font-size: 22px;
        font-weight: 500;
        letter-spacing: 0.5px;
        color: var(--text);
        font-variant-numeric: tabular-nums;
      }

      .stop {
        width: 32px;
        height: 32px;
        padding: 0;
        background: rgba(255, 255, 255, 0.05);
        color: var(--text-soft);
        border: 1px solid var(--border);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: background 0.15s ease, color 0.15s ease;
      }
      .stop:hover  { background: var(--hover); color: var(--text); }
      .stop:active { background: rgba(255, 255, 255, 0.16); }
      .stop svg    { display: block; }
    </style>
  </head>
  <body>
    <div class="column">
      <div class="avatars">
        <div class="avatar status-active" style="--c: #c19a7a;">A<span class="name">Alex Chen</span></div>
        <div class="avatar status-idle"   style="--c: #9a8770;">M<span class="name">Maya Rodriguez</span></div>
        <div class="avatar status-active" style="--c: #8a7d6a;">J<span class="name">Jamie Park</span></div>
        <div class="avatar status-off"    style="--c: #b08568;">S<span class="name">Sam Taylor</span></div>
        <div class="avatar status-active" style="--c: #7d8278;">R<span class="name">Riley Singh</span></div>
      </div>

      <div class="divider"></div>

      <div class="timer" id="timer">25:00</div>

      <button class="stop" id="stop" aria-label="Stop session" title="Stop">
        <svg width="10" height="10" viewBox="0 0 10 10" fill="currentColor" aria-hidden="true">
          <rect x="0" y="0" width="10" height="10" rx="1.5" />
        </svg>
      </button>
    </div>

    <script>
      let secs = 25 * 60;
      const timerEl = document.getElementById('timer');
      const tick = setInterval(() => {
        secs = Math.max(0, secs - 1);
        const m = String(Math.floor(secs / 60)).padStart(2, '0');
        const s = String(secs % 60).padStart(2, '0');
        timerEl.textContent = m + ':' + s;
        if (secs === 0) clearInterval(tick);
      }, 1000);

      document.getElementById('stop').addEventListener('click', () => {
        window.close();
      });
    </script>
  </body>
</html>
