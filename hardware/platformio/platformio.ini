[env:esp32dev]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
upload_speed = 115200
monitor_speed = 9600
upload_port = COM6
monitor_port = COM6
build_flags =
  -DARDUINO_USB_CDC_ON_BOOT=1
lib_deps =
  knolleary/PubSubClient@^2.8
  adafruit/Adafruit NeoPixel@^1.12.5
  dfrobot/DFRobotDFPlayerMini@^1.0.6
